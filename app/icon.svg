<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Background Gradient (Deep Hextech Blue) -->
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0f1e36" />
      <stop offset="100%" stop-color="#030811" />
    </radialGradient>
    <!-- Gold Gradient -->
    <linearGradient id="gold" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#785a28" />
      <stop offset="40%" stop-color="#c89b3c" />
      <stop offset="70%" stop-color="#ecc67a" />
      <stop offset="100%" stop-color="#f0e6d2" />
    </linearGradient>
    <!-- Highlight Gold -->
    <linearGradient id="gold-light" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#ecc67a" />
    </linearGradient>
  </defs>

  <!-- Background Shield/Crest -->
  <!-- Rounded square background -->
  <rect x="1" y="1" width="30" height="30" rx="8" fill="url(#bg)" stroke="url(#gold)" stroke-width="1.5" />
  
  <!-- Inner border line -->
  <rect x="3.5" y="3.5" width="25" height="25" rx="5.5" fill="none" stroke="url(#gold)" stroke-width="0.5" opacity="0.5" />

  <!-- Stylized Crest + L -->
  <!-- A shield pattern in the center -->
  <path d="M 16 6 L 23 10 L 21 21 L 16 26 L 11 21 L 9 10 Z" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.6" />
  
  <!-- Stylized L inside the shield -->
  <path d="M 12.5 10 
           L 15.5 10 
           L 15.5 18.5 
           L 20.5 18.5 
           L 20.5 21.5 
           L 12.5 21.5 
           Z" 
        fill="url(#gold)" />
        
  <!-- Center gem/star -->
  <path d="M 16 11.5 L 17 13 L 18.5 13 L 17.2 14 L 17.7 15.5 L 16 14.5 L 14.3 15.5 L 14.8 14 L 13.5 13 L 15 13 Z" fill="url(#gold-light)" />
</svg>
